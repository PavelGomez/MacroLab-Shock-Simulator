<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Atlas shock × configuración institucional — Lentes institucionales · MacroLab</title>
<style>
  :root{
    --bg:#f3f6fa; --panel:#ffffff; --panel-2:#eaf3fb; --line:#d8e1ea;
    --txt:#1c2a35; --muted:#647789; --accent:#2d6ea3; --warn:#d97706; --ok:#16a34a; --bad:#ef4444;
    --chip:#eaf3fb; --navy:#0f2740; --navy-deep:#091a2d;
    --shock:#e11d48; --regime:#7c3aed; --cb:#2563eb; --rule:#16a34a; --buffer:#d97706; --outcome:#db2777;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--txt);font:14px/1.5 "Inter",system-ui,-apple-system,sans-serif}
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}
  /* Header */
  header.top{background:linear-gradient(180deg,var(--navy) 0%,var(--navy-deep) 100%);color:#fff;padding:22px 24px;display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:space-between}
  header.top .hd-left p{margin:0 0 6px;font-size:.82rem;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.78)}
  header.top h1{margin:0;font-size:1.35rem;font-weight:700;color:#fff}
  header.top h1 small{color:rgba(255,255,255,.65);font-weight:400;margin-left:8px;font-size:.9rem}
  .back-link{display:inline-flex;align-items:center;color:rgba(255,255,255,.88);font-size:.84rem;font-weight:700;text-decoration:none;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);padding:6px 13px;border-radius:999px}
  .back-link:hover{background:rgba(255,255,255,.22);color:#fff;text-decoration:none}
  .hd-right{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  /* Layout */
  .layout{display:grid;grid-template-columns:280px 1fr;gap:0;min-height:calc(100vh - 88px)}
  aside.filters{background:var(--panel);border-right:1px solid var(--line);padding:18px;overflow-y:auto}
  aside.filters h2{font-size:12px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);margin:0 0 8px;font-weight:600}
  aside.filters .group{margin-bottom:18px;padding-bottom:14px;border-bottom:1px dashed var(--line)}
  aside.filters .group:last-of-type{border-bottom:none}
  aside.filters label{display:flex;align-items:center;gap:8px;padding:4px 0;cursor:pointer;color:var(--txt);font-size:13px}
  aside.filters input[type=checkbox]{accent-color:var(--accent)}
  main.content{padding:22px;overflow-y:auto}
  .topbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:space-between;margin-bottom:14px}
  .pill{background:var(--panel);color:var(--muted);padding:4px 10px;border-radius:999px;font-size:12px;border:1px solid var(--line)}
  .pill strong{color:var(--txt)}
  /* View buttons */
  .views{display:flex;gap:6px;flex-wrap:wrap}
  .views button{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.22);padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit}
  .views button.is-active{background:#fff;color:var(--navy);border-color:#fff;font-weight:700}
  .reset{background:transparent;color:var(--muted);border:1px dashed var(--line);padding:6px 10px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit}
  .reset:hover{color:var(--txt);border-color:var(--accent)}
  /* Cards */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px;display:flex;flex-direction:column;gap:10px;transition:transform .12s ease}
  .card:hover{transform:translateY(-1px);border-color:var(--accent)}
  .card h3{margin:0;font-size:15px}
  .card .sub{color:var(--muted);font-size:12px}
  .card .pregunta{font-size:13px;color:var(--txt);font-style:italic;border-left:2px solid var(--accent);padding-left:8px}
  .card .mech{font-size:12.5px;color:var(--txt)}
  .card .valor{font-size:11.5px;color:var(--muted);font-style:italic}
  .chips{display:flex;flex-wrap:wrap;gap:4px}
  .chip{font-size:10.5px;padding:2px 8px;border-radius:999px;background:var(--chip);color:var(--txt);border:1px solid var(--line)}
  .chip.shock  {color:var(--shock);  border-color:#fecdd3;background:#fff1f2}
  .chip.regime {color:var(--regime); border-color:#ede9fe;background:#f5f3ff}
  .chip.cb     {color:var(--cb);     border-color:#dbeafe;background:#eff6ff}
  .chip.rule   {color:var(--rule);   border-color:#dcfce7;background:#f0fdf4}
  .chip.buffer {color:var(--buffer); border-color:#fef3c7;background:#fffbeb}
  .chip.outcome{color:var(--outcome);border-color:#fce7f3;background:#fdf2f8}
  .card .actions{display:flex;gap:10px;margin-top:auto;padding-top:8px;border-top:1px dashed var(--line)}
  .card .actions a{font-size:12.5px}
  /* Matrix */
  .matrix-wrap{overflow-x:auto;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px}
  table.matrix{border-collapse:separate;border-spacing:6px;font-size:12.5px;min-width:760px}
  table.matrix th{color:var(--muted);font-weight:500;padding:6px 8px;text-align:left;font-size:11.5px;letter-spacing:.4px}
  table.matrix td{background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:8px;vertical-align:top;min-width:130px;height:84px}
  table.matrix td.empty{background:transparent;border:1px dashed var(--line);color:var(--muted);font-style:italic;text-align:center}
  table.matrix td .mcase{display:block;color:var(--txt);font-size:12.5px;margin-bottom:2px}
  table.matrix td .mcase a{color:var(--accent)}
  table.matrix td.outcome-anchored{outline:2px solid var(--ok)}
  table.matrix td.outcome-temporary_unanchoring{outline:2px solid var(--warn)}
  table.matrix td.outcome-persistent_unanchoring{outline:2px solid var(--bad)}
  /* MacroLab 4×8 matrix */
  table.macrolab{border-collapse:separate;border-spacing:6px;font-size:12px;min-width:880px}
  table.macrolab th{color:var(--muted);font-weight:500;padding:8px;text-align:left;font-size:11.5px;letter-spacing:.4px;vertical-align:middle}
  table.macrolab th.col{font-weight:600;color:#fff;background:var(--navy);border-radius:6px;text-align:center}
  table.macrolab td{background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:8px;vertical-align:top;min-width:120px;height:78px;font-size:11.5px}
  table.macrolab td.has-route{border-color:var(--ok);background:#f0fdf4}
  table.macrolab td.has-pending{border-color:var(--warn);border-style:dashed;background:#fffbeb}
  table.macrolab td.empty{background:transparent;border:1px dashed var(--line);color:var(--muted);font-style:italic;text-align:center;padding-top:24px}
  table.macrolab td a{color:var(--accent);text-decoration:none}
  table.macrolab td .badge{font-size:9.5px;text-transform:uppercase;letter-spacing:.6px;padding:1px 6px;border-radius:999px;display:inline-block;margin-bottom:4px}
  table.macrolab td.has-route .badge{background:#dcfce7;color:#15803d}
  table.macrolab td.has-pending .badge{background:#fef3c7;color:#92400e}
  .legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:12px;font-size:11.5px;color:var(--muted)}
  .legend .key{display:inline-flex;align-items:center;gap:6px}
  .legend .key i{width:14px;height:14px;display:inline-block;border-radius:3px;border:1px solid var(--line)}
  .legend .key i.ok{border-color:var(--ok);background:#f0fdf4}
  .legend .key i.pend{border-color:var(--warn);border-style:dashed;background:#fffbeb}
  .legend .key i.empty{border:1px dashed var(--line);background:transparent}
  /* Coverage */
  .coverage{margin-top:18px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px}
  .coverage h2{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;margin:0 0 10px}
  .cov-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
  .cov-cell{background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:10px}
  .cov-cell .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
  .cov-cell .val{font-size:13px;color:var(--txt)}
  .cov-cell .bar{height:6px;background:var(--line);border-radius:6px;overflow:hidden;margin-top:6px}
  .cov-cell .bar > span{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--ok));border-radius:6px}
  /* Detail panel */
  .detail{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;padding:24px;z-index:50}
  .detail.is-open{display:flex}
  .detail .pane{background:var(--panel);border:1px solid var(--line);border-radius:12px;max-width:760px;width:100%;max-height:90vh;overflow-y:auto;padding:22px}
  .detail h3{margin:0 0 4px}
  .detail .close{float:right;background:transparent;color:var(--muted);border:none;font-size:18px;cursor:pointer}
  .detail .sec{margin-top:14px;padding-top:12px;border-top:1px dashed var(--line)}
  .detail .sec h4{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;margin:0 0 8px}
  .detail .sec.knowledge p{padding:8px 10px;border-radius:6px;background:var(--panel-2);margin:6px 0;font-size:13px}
  .detail .sec.knowledge .a{border-left:3px solid var(--ok)}
  .detail .sec.knowledge .b{border-left:3px solid var(--warn)}
  .detail .sec.knowledge .c{border-left:3px solid var(--accent)}
  footer.foot{padding:14px 22px;color:var(--muted);font-size:12px;border-top:1px solid var(--line);text-align:center}
  /* Lentes institucionales — panel de detalle */
  .il-grid-atlas{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px}
  @media(max-width:600px){.il-grid-atlas{grid-template-columns:1fr}}
  .il-atlas-panel{background:var(--panel-2);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:6px;padding:9px 11px}
  .il-atlas-label{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:5px}
  .il-atlas-text{font-size:12.5px;color:var(--txt);line-height:1.55;margin:0}
  @media (max-width:780px){
    .layout{grid-template-columns:1fr}
    aside.filters{border-right:none;border-bottom:1px solid var(--line)}
  }
</style>
</head>
<body>
<header class="top">
  <div class="hd-left">
    <p>Macroeconomía II · Profesor Pável Gómez · 2026</p>
    <h1>Atlas shock × configuración institucional <small>· Lentes institucionales · MacroLab</small></h1>
  </div>
  <div class="hd-right">
    <a href="index.html" class="back-link">← Volver al simulador</a>
    <div class="views">
      <button data-view="grid"   class="is-active">Tarjetas</button>
      <button data-view="matrix">Matriz régimen × BC</button>
      <button data-view="macrolab">Matriz MacroLab (4×8)</button>
      <button data-view="coverage">Cobertura</button>
    </div>
  </div>
</header>

<div class="layout">
  <aside class="filters" id="filters"></aside>
  <main class="content">
    <div class="topbar">
      <div class="pill">Crónicas mostradas: <strong id="count">0</strong> / <strong id="total">0</strong></div>
      <button class="reset" id="reset">Limpiar filtros</button>
    </div>
    <div id="view-grid" class="view"></div>
    <div id="view-matrix" class="view" hidden></div>
    <div id="view-macrolab" class="view" hidden></div>
    <div id="view-coverage" class="view" hidden></div>
  </main>
</div>

<div class="detail" id="detail" role="dialog" aria-modal="true">
  <div class="pane" id="detail-pane"></div>
</div>

<footer class="foot">
  Atlas v0.2 · 12 rutas editoriales registradas (37 % de cobertura) · Pável Gómez Valera, 2026.
</footer>

<script>
/* ===========================================================
 *  Atlas shock × configuración institucional
 *  Standalone (sin dependencias). Datos embebidos para que el
 *  archivo funcione abriéndolo directamente con doble click.
 *  Para producción, el bloque DATA puede reemplazarse por
 *  fetch('atlas_data.json').
 * =========================================================== */

const MACROLAB = {
  configs: {
    "CHL": "Chile 2026 · Credibilidad macro",
    "FRG": "Anclaje frágil",
    "RIG": "Rigidez cambiaria",
    "CRD": "Alta credibilidad con buffer"
  },
  lentes: {
    "petroleo":         { label:"Alza del petróleo / energía", tab:"oada" },
    "cobre":            { label:"Caída del cobre",             tab:"islmbp" },
    "pandemia":         { label:"Pandemia",                    tab:"oada" },
    "fiscalExpand":     { label:"Expansión fiscal",            tab:"islm" },
    "fiscalContract":   { label:"Contracción fiscal",          tab:"islm" },
    "monetaryContract": { label:"Contracción monetaria",       tab:"islm" },
    "globalRecession":  { label:"Recesión global",             tab:"islmbp" },
    "guerra":           { label:"Guerra / shock mixto",        tab:"oada" }
  },
  rutas_registradas: [
    { lente:"petroleo",       config:"CHL", cronicaKey:"chile_2021_2024" },
    { lente:"petroleo",       config:"FRG", cronicaKey:"turkey_2018_2023" },
    { lente:"cobre",          config:"CHL", cronicaKey:"chile_2008_2009" },
    { lente:"fiscalContract", config:"CHL", cronicaKey:"chile_2008_2009" },
    { lente:"pandemia",       config:"CHL", cronicaKey:"chile_2021_2024" },
    { lente:"pandemia",       config:"CRD", cronicaKey:"noruega_2020" },
    { lente:"pandemia",       config:"FRG", cronicaKey:"argentina_2020" },
    { lente:"fiscalContract", config:"CRD", cronicaKey:"suecia_1994_1998" },
    { lente:"fiscalContract", config:"FRG", cronicaKey:"grecia_2010_2015" },
    { lente:"globalRecession", config:"RIG", cronicaKey:"argentina_convertibility" },
    { lente:"fiscalContract",  config:"RIG", cronicaKey:"argentina_convertibility" },
    { lente:"petroleo",        config:"RIG", cronicaKey:"argentina_convertibility" }
  ],
  gaps_prioritarios: []
};

const DATA = /* @atlas_data_json_inline */ {
  "tag_labels": {
    "shock_types":         {"inflation_demand":"Sobreestímulo de demanda agregada","fx_capital_flight":"Sudden stop / fuga de capitales","external_financial":"Crisis financiera global","commodity":"Shock de términos de intercambio","pandemic":"Shock de pandemia (covid-19)","sovereign_default":"Default o reestructuración soberana","banking_crisis":"Crisis bancaria sistémica"},
    "exchange_regime":     {"floating":"Flotación cambiaria","managed_float":"Flotación administrada","hard_peg":"Ancla cambiaria rígida (hard peg)","monetary_union":"Unión monetaria","mixed":"Régimen mixto"},
    "central_bank":        {"independent_inflation_target":"BC autónomo con meta de inflación","recently_adopted_target":"BC con meta en consolidación","political_pressure":"BC con autonomía erosionada","no_target":"BC con ancla nominal delegada","fx_anchor_substitute":"Régimen monetario por ancla cambiaria"},
    "fiscal_rule":         {"structural_rule":"Regla fiscal estructural","flexible_rule":"Regla fiscal con cláusulas de escape","imposed_external":"Programa de condicionalidad externa","absent":"Sin marco fiscal vinculante"},
    "fiscal_buffer":       {"high":"Espacio fiscal amplio","medium":"Espacio fiscal moderado","low":"Espacio fiscal estrecho","negative":"Sin espacio fiscal (default declarado o inminente)"},
    "credibility_outcome": {"anchored":"Expectativas ancladas","temporary_unanchoring":"Desanclaje transitorio","persistent_unanchoring":"Desanclaje persistente"}
  },
  "cronicas":[
    {"id": "chile_2021_2024", "titulo": "Chile, 2021-2024", "sub": "Credibilidad en economía abierta", "pais": "Chile", "periodo": "2021-2024", "preguntaGuia": "¿Qué hace que un episodio de alta inflación no termine en un desanclaje permanente de expectativas?", "tags": {"shock_types": ["inflation_demand"], "exchange_regime": "floating", "central_bank": "independent_inflation_target", "fiscal_rule": "structural_rule", "fiscal_buffer": "medium", "credibility_outcome": "anchored"}, "mecanismo_breve": "Sobreestímulo de demanda interno (retiros previsionales + IFE Universal) sumado a presión global de precios; BC autónomo con meta de 3% lleva TPM a 11,25% (oct-2022) y la sostiene; expectativas a 24 meses no se desanclan persistentemente; convergencia al rango meta hacia 2024.", "valor_historico": "Caso latinoamericano de absorción de un shock inflacionario severo bajo marco institucional creíble; útil para contrastar con Turquía 2018-2023.", "cronica": ["Tras la pandemia, los retiros previsionales y la liquidez global empujaron la inflación chilena. La variación anual del IPC alcanzó su peak en agosto de 2022 al llegar a 14,1%, el nivel más alto desde septiembre de 1992, según el INE.", "El Banco Central llevó la TPM desde 0,5% en julio de 2021 hasta 11,25% en octubre de 2022, y la mantuvo en ese nivel durante casi un año. La comunicación insistió en que la convergencia a la meta de 3% era prioridad, incluso ante presiones por aliviar la carga financiera.", "La inflación cedió hacia el rango meta durante 2024, sin un desanclaje persistente de las expectativas a 24 meses. El costo del ajuste se distribuyó entre actividad y precios; los salarios reales tardaron en recuperarse y el desempleo se mantuvo por encima de 8% durante el proceso."], "caveat": "Ilustra una respuesta creíble de banco central en una economía abierta. No es prescripción para otros casos ni predicción para episodios futuros.", "fuentes": [{"texto": "BCCh (2022). IPoM diciembre 2022.", "url": "https://www.bcentral.cl/contenido/-/detalle/ipom-diciembre-2022"}, {"texto": "INE Chile. IPC — series y notas técnicas.", "url": "https://www.ine.gob.cl/estadisticas/economia/indices-de-precio-e-inflacion/indice-de-precios-al-consumidor"}, {"texto": "FMI (2024). Chile: 2023 Article IV Consultation. CR 24/29.", "url": "https://www.imf.org/en/Publications/CR/Issues/2024/02/06/Chile-2023-Article-IV-Consultation-Press-Release-Staff-Report-545020"}, {"texto": "Albagli, Grigoli & Luttini (2024). Inflation Expectations and the Supply Chain.", "url": "https://www.imf.org/-/media/files/conferences/2024/global-challenges-and-channels-for-fiscal-and-monetary-policy/inflation-expectations-and-the-supply-chain-albagli-grigoli-and-luttini.pdf"}, { texto: "Coibion, Gorodnichenko, Kumar & Pedemonte (2020). Inflation expectations as a policy tool? Journal of International Economics 124.", url: "https://doi.org/10.1016/j.jinteco.2020.103297" }]},
    {"id": "turkey_2018_2023", "titulo": "Turquía, 2018-2023", "sub": "Anclaje frágil con presión política sobre el banco central", "pais": "Turquía", "periodo": "2018-2023", "preguntaGuia": "¿Cuándo la presión política sobre la autoridad monetaria deja de ser ruido y se vuelve constitutiva del régimen nominal?", "tags": {"shock_types": ["inflation_demand", "fx_capital_flight"], "exchange_regime": "managed_float", "central_bank": "political_pressure", "fiscal_rule": "absent", "fiscal_buffer": "low", "credibility_outcome": "persistent_unanchoring"}, "mecanismo_breve": "Presión política sostenida sobre BC; recortes de tasa con inflación al alza; rotación de presidentes del BC; pass-through cambiario acelerado; medidas heterodoxas insuficientes; giro post-elecciones 2023 con resultados graduales.", "valor_historico": "Mecanismo de desanclaje endógeno cuando la presión política se vuelve constitutiva del régimen, no shock exógeno.", "cronica": ["Entre 2018 y 2023 Turquía atravesó múltiples episodios cambiarios. La inflación, que ya rondaba 15% al inicio del periodo, alcanzó su peak en octubre de 2022 al llegar a 85,51% interanual, según TÜİK.", "Frente a un cuadro que sugería contracción monetaria, la autoridad operó bajo presión política. En varios momentos del periodo el banco central recortó tasas mientras la inflación subía. La rotación de presidentes del banco central acentuó la percepción de baja autonomía.", "Las expectativas se desanclaron, el pass-through cambiario se aceleró, y las medidas heterodoxas no contuvieron la dinámica. Tras las elecciones de mayo de 2023 hubo un giro hacia tasas más altas, con resultados graduales: la inflación bajó a 38% en junio de 2023 y siguió cediendo en los años siguientes, aunque a niveles aún elevados."], "caveat": "Ilustra un mecanismo de desanclaje de expectativas y presión política sobre la autoridad monetaria, no un destino atribuible al país. Ningún rasgo nacional explica por sí solo la trayectoria; lo que se enseña es el mecanismo institucional.", "fuentes": [{"texto": "TÜİK (2022). CPI Turquía — boletín octubre 2022 (peak 85,51%).", "url": "https://data.tuik.gov.tr/Bulten/Index?p=Tuketici-Fiyat-Endeksi-Ekim-2022-45798"}, {"texto": "BIS (2023). Navigating the disinflation journey. AER 2023.", "url": "https://www.bis.org/publ/arpdf/ar2023e1.htm"}, {"texto": "Demiralp & Demiralp (2019). Erosion of central bank independence in Turkey. EER 9.", "url": "https://doi.org/10.1007/s40822-018-0118-0"}, {"texto": "Garriga & Rodriguez (2020). CBI and inflation in developing countries. JIMF 104.", "url": "https://doi.org/10.1016/j.jimonfin.2020.102166"}, {"texto": "Focus Economics, Turkey CPI.", "url": "https://www.focus-economics.com/country-indicator/turkey/inflation/"}]},
    {"id": "argentina_convertibility", "titulo": "Argentina, convertibilidad 1991-2002", "sub": "Rigidez cambiaria bajo inconsistencia fiscal", "pais": "Argentina", "periodo": "1991-2002", "preguntaGuia": "¿Qué señales anticipan que un régimen rígido ha dejado de ser consistente con su entorno fiscal y de productividad?", "tags": {"shock_types": ["external_financial", "fx_capital_flight"], "exchange_regime": "hard_peg", "central_bank": "fx_anchor_substitute", "fiscal_rule": "absent", "fiscal_buffer": "negative", "credibility_outcome": "persistent_unanchoring"}, "mecanismo_breve": "Caja de conversión exitosa contra hiperinflación; tensión acumulada por déficit fiscal estructural, deuda dolarizada y rigidez salarial; crisis externas (Tequila, Rusia, real) y salida traumática con default y devaluación.", "valor_historico": "Ejemplo paradigmático de inconsistencia entre ancla rígida y marco fiscal-productivo; ancla en debates sobre dolarización.", "cronica": ["La Ley 23.928, sancionada en marzo de 1991 y vigente desde el 1 de abril de ese año, fijó la paridad un peso por un dólar y rompió un ciclo hiperinflacionario previo. Por casi una década, la inflación se mantuvo en niveles bajos y la economía recibió capitales.", "Las tensiones se acumularon: déficit fiscal sostenido a nivel nacional y provincial, deuda pública creciente y dolarizada, salarios reales rígidos a la baja, productividad insuficiente para sostener la paridad real. La crisis del Tequila (1994–1995) fue un primer aviso; la economía sobrevivió.", "Pero la crisis rusa de 1998 y la devaluación del real brasileño en enero de 1999 abrieron una recesión persistente. La salida de capitales emergentes, sumada a la rigidez del régimen, hizo el ajuste real traumático. El \"corralito\" de diciembre de 2001 y la renuncia de De la Rúa precipitaron el final. La Ley fue derogada el 6 de enero de 2002, con default y devaluación posterior."], "caveat": "Ilustra cómo un ancla rígida acumula tensión cuando no es consistente con el resto del marco fiscal y de productividad. No que toda rigidez fracase, ni que la convertibilidad fuera inútil siempre. Distintos autores han ofrecido explicaciones complementarias del colapso.", "fuentes": [{"texto": "Ley 23.928 (1991). Régimen de convertibilidad.", "url": "https://www.argentina.gob.ar/normativa/nacional/ley-23928-328"}, {"texto": "Ley 25.561 (2002). Emergencia pública y reforma del régimen cambiario.", "url": "https://servicios.infoleg.gob.ar/infolegInternet/anexos/70000-74999/71477/norma.htm"}, { texto: "IMF Independent Evaluation Office (2004). The IMF and Argentina, 1991–2001.", url: "https://www.imf.org/en/Publications/Independent-Evaluation-Office-Reports/Issues/2016/12/31/The-IMF-and-Argentina-1991-2001-17590" }, {"texto": "Calvo, Izquierdo & Mejía (2008). Systemic Sudden Stops. NBER WP 14026.", "url": "https://www.nber.org/papers/w14026"}, { texto: "De la Torre, Levy Yeyati & Schmukler (2003). Living and Dying with Hard Pegs: The Rise and Fall of Argentina’s Currency Board. Economía 3(2).", url: "https://economia.lse.ac.uk/en/articles/10.1353/eco.2003.0010" }]},
    {"id": "chile_2008_2009", "titulo": "Chile, 2008-2009", "sub": "Buffers en versión emergente", "pais": "Chile", "periodo": "2008-2009", "preguntaGuia": "¿Qué condiciones permiten que un buffer fiscal acumulado en bonanza se use con credibilidad en una crisis externa?", "tags": {"shock_types": ["external_financial"], "exchange_regime": "floating", "central_bank": "independent_inflation_target", "fiscal_rule": "structural_rule", "fiscal_buffer": "high", "credibility_outcome": "anchored"}, "mecanismo_breve": "FEES con US$20.211 millones acumulados (≈15% PIB en activos soberanos); TPM cae 775 pb hasta 0,5%; plan fiscal 2,8% PIB financiado con FEES; recuperación rápida sin perder credibilidad.", "valor_historico": "Caso emergente exitoso de uso countercíclico de buffers acumulados en bonanza commodity.", "cronica": ["Cuando la crisis financiera global se transmitió a Chile a fines de 2008, el FEES había acumulado US$ 20.211 millones gracias al superávit cuprífero del periodo 2005–2008. Junto al Fondo de Reserva de Pensiones y otros activos del Tesoro, los ahorros soberanos representaban cerca del 15% del PIB.", "Frente al shock, el Banco Central recortó la TPM en 775 puntos base entre comienzos de 2009 y mediados de ese año, llevándola a un mínimo histórico de 0,5%. El gobierno anunció un Plan de Estímulo Fiscal de 2,8% del PIB, financiado con recursos del FEES y emisión de deuda pública, dirigido a inversión, transferencias a hogares de bajos ingresos y subsidios al empleo.", "La actividad cayó en 2009 pero la economía volvió a expandirse hacia fines de ese año. La regla de balance estructural y los ahorros soberanos hicieron viable la respuesta sin comprometer la credibilidad ni la sostenibilidad. El FMI calificó la respuesta de \"vigorosa, bien equilibrada y coordinada\" en su Article IV de 2009."], "caveat": "Ilustra el uso de buffers fiscales y monetarios construidos en periodos buenos. No un blindaje absoluto; las condiciones —regla creíble, ahorro previo, supervisión funcional— hicieron viable la respuesta en ese momento.", "fuentes": [{"texto": "DIPRES (2009). Informe FEES diciembre 2009.", "url": "https://www.dipres.gob.cl/598/articles-61210_doc_pdf.pdf"}, {"texto": "FMI (2009). Chile: 2009 Article IV Consultation. CR 09/271.", "url": "https://www.imf.org/external/pubs/ft/scr/2009/cr09271.pdf"}, {"texto": "DIPRES (2022). Cumplimiento de las metas de regla fiscal en Chile: Revisión histórica.", "url": "https://www.dipres.gob.cl/598/articles-299473_doc_pdf.pdf"}, {"texto": "De Gregorio (2014). How Latin America Weathered the Global Financial Crisis. PIIE.", "url": "https://www.piie.com/bookstore/how-latin-america-weathered-global-financial-crisis"}, { texto: "Végh & Vuletin (2012). Overcoming the Fear of Free Falling: Monetary Policy Graduation in Emerging Markets. NBER Working Paper 18175.", url: "https://www.nber.org/papers/w18175" }, ]},
    {"id": "noruega_2020", "titulo": "Noruega, 2020", "sub": "Buffer soberano y banco central creíble frente a un shock dual", "pais": "Noruega", "periodo": "2020", "preguntaGuia": "¿Qué permite que un Estado use gasto fiscal extraordinario sin desanclar expectativas?", "tags": {"shock_types": ["pandemic", "commodity"], "exchange_regime": "floating", "central_bank": "independent_inflation_target", "fiscal_rule": "flexible_rule", "fiscal_buffer": "high", "credibility_outcome": "anchored"}, "mecanismo_breve": "Pandemia + caída del petróleo; tasa al 0% (mayo 2020); transferencias del Government Pension Fund Global por ≈3,4% de su valor (máximo histórico); contracción 2020 menor que mediana OCDE; expectativas ancladas.", "valor_historico": "Caso límite de espacio fiscal soberano; útil para discutir replicabilidad y legitimidad política del uso de buffers.", "cronica": ["En el primer trimestre de 2020 Noruega enfrentó un shock dual: la pandemia de covid-19 y, simultáneamente, una fuerte caída del precio del petróleo que debilitó la corona y deterioró las expectativas del sector de hidrocarburos. Norges Bank documentó explícitamente esta combinación: la actividad doméstica se contrajo no solo por restricciones sanitarias internas, sino por la transmisión externa de ambos canales. La autoridad monetaria redujo la tasa de política desde 1,5% a 0,25% en dos reuniones consecutivas en marzo y la llevó a 0% el 7 de mayo de 2020, primer cero histórico para la institución. La economía continental se contrajo cerca de 2,5% en 2020, una caída más leve que la mediana de la OCDE.", "El marco fiscal noruego permitió un uso extraordinario del fondo soberano por encima de la senda de referencia habitual. Las transferencias netas del Government Pension Fund Global al presupuesto durante 2020 alcanzaron cerca de 417 mil millones de coronas, equivalentes a aproximadamente 3,4% del valor del fondo, un máximo histórico. El desempleo registrado se elevó respecto del nivel pre-pandemia pero retornó a niveles cercanos hacia fines de 2021. Las expectativas de inflación a mediano plazo no se desanclaron en ningún momento del episodio, según los registros de Norges Bank.", "La interpretación más parsimoniosa es que Noruega enfrentó el shock dual desde una posición institucional excepcional —fondo soberano operativo, regla fiscal flexible pero creíble, banco central con meta de inflación consolidada— y esa combinación permitió absorber parte del golpe mediante gasto fiscal extraordinario y política monetaria expansiva sin convertir el episodio en una crisis de expectativas. La replicabilidad del caso es limitada: la acumulación previa del fondo dependió de una estructura de rentas petroleras y un consenso político que no se transfieren mecánicamente. La pregunta abierta no es solo si una economía tiene buffer, sino si tiene legitimidad política para usarlo."], "caveat": "Ilustra una configuración institucional e histórica específica frente a un shock dual; no caracteriza permanentemente al país. La acumulación previa del fondo dependió de una estructura de rentas petroleras y de un consenso político que no se transfieren mecánicamente. No demuestra inmunidad ante shocks futuros: el fondo se reduce con cada uso y su sostenibilidad depende del retorno real prospectivo.", "fuentes": [{"texto": "Bjørnland & Thorsrud (2016). Boom or Gloom? Economic Journal 126(598).", "url": "https://doi.org/10.1111/ecoj.12302"}, {"texto": "van der Ploeg (2011). Natural Resources: Curse or Blessing? JEL 49(2).", "url": "https://doi.org/10.1257/jel.49.2.366"}, { texto: "van den Bremer & van der Ploeg (2013). Managing and Harnessing Volatile Oil Windfalls. IMF Economic Review 61(1).", url: "https://doi.org/10.1057/imfer.2013.4" }, {"texto": "Norges Bank (2020). Monetary Policy Report 1/2020.", "url": "https://www.norges-bank.no/en/news-events/news-publications/Reports/Monetary-Policy-Report-with-financial-stability-assessment/2020/mpr-12020/"}, {"texto": "Norges Bank (2020). Monetary Policy Report 2/2020.", "url": "https://www.norges-bank.no/en/news-events/news-publications/Reports/Monetary-Policy-Report-with-financial-stability-assessment/2020/mpr-22020/"}, {"texto": "FMI (2021). Norway: 2021 Article IV Consultation. CR 21/197.", "url": "https://www.imf.org/en/Publications/CR/Issues/2021/09/13/Norway-2021-Article-IV-Consultation-Press-Release-Staff-Report-466009"}, {"texto": "OECD (2022). OECD Economic Surveys: Norway 2022. DOI 10.1787/df7b87ab-en.", "url": "https://doi.org/10.1787/df7b87ab-en"}, { texto: "Norwegian Ministry of Finance (2022). Sound economic governance — fiscal budget and Government Pension Fund key figures.", url: "https://www.regjeringen.no/en/aktuelt/sound-economic-governance/id2912392/" }]},
    {"id": "argentina_2020", "titulo": "Argentina, 2020", "sub": "Pandemia sobre default soberano, brecha cambiaria y anclaje frágil", "pais": "Argentina", "periodo": "2020", "preguntaGuia": "¿Cuándo una respuesta fiscal-monetaria de emergencia se convierte en señal de dominancia fiscal?", "tags": {"shock_types": ["pandemic", "sovereign_default", "fx_capital_flight"], "exchange_regime": "managed_float", "central_bank": "political_pressure", "fiscal_rule": "absent", "fiscal_buffer": "negative", "credibility_outcome": "persistent_unanchoring"}, "mecanismo_breve": "Pandemia sobre recesión preexistente y default técnico (mayo 2020); financiamiento del déficit con asistencia monetaria al Tesoro (base monetaria +60% en 2020); brecha cambiaria >100% (CCL 130% en oct-2020); inflación 2020 36,1%, 2021 50,9%, 2022 94,8%.", "valor_historico": "Caso de transformación de un shock global común en aceleración inflacionaria persistente bajo marco institucional débil; contraste natural con Chile 2021-2024.", "cronica": ["La pandemia llegó a Argentina con una economía ya en recesión desde 2018, una negociación de reestructuración soberana en curso y el cepo cambiario reinstaurado en septiembre de 2019. El default técnico sobre los bonos en dólares se declaró el 22 de mayo de 2020. La reestructuración con tenedores privados se cerró en agosto, pero el estrés cambiario y monetario continuó. En este marco, la respuesta fiscal-monetaria de emergencia no opera como un estímulo neutral: se interpreta dentro de una historia previa de dominancia fiscal, baja demanda de dinero, controles cambiarios y expectativas de depreciación.", "La asistencia monetaria al Tesoro fue el principal canal de financiamiento del déficit pandémico: la base monetaria creció más de 60% en 2020. La economía cayó 9,9% en 2020 según CEPAL. La inflación, medida diciembre-contra-diciembre, fue 36,1% en 2020, 50,9% en 2021 y 94,8% en 2022; medida como promedio anual, las cifras son distintas (CEPAL reporta 42,0% para 2020). La brecha entre el tipo de cambio oficial y los tipos de cambio paralelos y financieros superó ampliamente el 100% en octubre de 2020; el contado con liquidación llegó a 130% el 22 de octubre. Las expectativas de inflación a 12 meses permanecieron persistentemente desancladas según el REM del BCRA.", "La interpretación parsimoniosa es que un marco institucional con banco central de autonomía formal pero limitada en la práctica, sin regla fiscal vinculante y con historia reciente de default, transformó el shock pandémico común en un episodio de aceleración inflacionaria persistente. El mecanismo no se reduce a 'emisión genera inflación': combina dominancia fiscal, baja demanda de dinero, brecha cambiaria, controles y restricción externa, alterando Pᵉ y la formación de precios posterior. La asignación de DEG por parte del FMI en agosto de 2021 alivió temporalmente la cuenta de reservas, pero no modificó la trayectoria nominal subyacente."], "caveat": "Ilustra una configuración institucional e histórica específica frente a un shock global común; no caracteriza permanentemente al país. La fragilidad institucional se construye y se desarma con decisiones acumuladas. Otros países latinoamericanos con shocks comparables y marcos institucionales más robustos —Chile, Perú, Uruguay— tuvieron trayectorias significativamente diferentes.", "fuentes": [{"texto": "Calvo & Reinhart (2002). Fear of Floating. QJE 117(2).", "url": "https://doi.org/10.1162/003355302753650274"}, {"texto": "Mosquera & Sturzenegger (2021). Cepo para principiantes. Desarrollo Económico 61(234).", "url": "https://revistas.ides.org.ar/desarrollo-economico/article/view/165"}, {"texto": "Sturzenegger (2020). ¿Necesitamos repensar la política de deuda en Latinoamérica? UNDP LAC C19 PDS No. 23.", "url": "https://www.undp.org/sites/g/files/zskgke326/files/2023-01/CD19-PDS-Number23%20Deuda%20ES.pdf"}, {"texto": "FMI (2021). Argentina: Ex Post Evaluation 2018 SBA. CR 21/279.", "url": "https://www.imf.org/en/Publications/CR/Issues/2021/12/22/Argentina-Ex-Post-Evaluation-of-Exceptional-Access-Under-the-2018-Stand-By-Arrangement-511289"}, {"texto": "CEPAL (2021). Estudio Económico de América Latina y el Caribe 2021.", "url": "https://www.cepal.org/es/publicaciones/47192-estudio-economico-america-latina-caribe-2021"}, {"texto": "BCRA. Relevamiento de Expectativas de Mercado (REM) 2020-2022.", "url": "https://www.bcra.gob.ar/PublicacionesEstadisticas/relevamiento_expectativas_de_mercado.asp"}]},
    {"id": "suecia_1994_1998", "titulo": "Suecia, 1994-1998", "sub": "Consolidación fiscal con anclaje creíble tras crisis bancaria", "pais": "Suecia", "periodo": "1994-1998", "preguntaGuia": "¿Cuándo una contracción fiscal puede ser interpretada como restauración de solvencia y no como profundización de crisis?", "tags": {"shock_types": ["banking_crisis"], "exchange_regime": "floating", "central_bank": "recently_adopted_target", "fiscal_rule": "structural_rule", "fiscal_buffer": "medium", "credibility_outcome": "anchored"}, "mecanismo_breve": "Crisis bancaria 1991-1993 con Securum como banco malo; déficit ≈12% PIB; consolidación 1994-1998 con consenso transversal lleva a superávit; Riksbank con meta inflación adoptada 1993, formal 1995, independencia 1999; spread soberano controlado.", "valor_historico": "Caso de éxito de consolidación con sistema bancario saneado, depreciación previa y ciclo global expansivo; cautela contra lecturas simplistas de 'austeridad expansiva'.", "cronica": ["Tras la crisis financiera 1991-1993 —marcada por la quiebra controlada de Nordbanken, la creación de Securum como \"banco malo\" y la salida de la corona del MTC en noviembre de 1992—, Suecia enfrentaba un déficit fiscal cercano al 12% del PIB y una deuda pública en trayectoria de aproximarse al 80% del PIB. El gobierno socialdemócrata electo en 1994 inició un programa de consolidación que, con apoyo amplio entre coaliciones, redujo el déficit a posición de superávit hacia 1998. El Riksbank, ya operando bajo meta de inflación adoptada en enero de 1993 y aplicada formalmente desde 1995, en camino a la independencia formal de 1999, mantuvo expectativas ancladas durante todo el ajuste.", "El ajuste combinó reducciones de gasto y aumentos de ingresos, con un peso relevante de las medidas de gasto según varias reconstrucciones, aunque la proporción exacta depende del período y de la clasificación utilizada. La deuda pública/PIB cayó desde su máximo cercano al 78% en 1994 hasta alrededor del 65% en 1998. El crecimiento del PIB se mantuvo positivo durante el ajuste: 4,0% (1994), 3,9% (1995), 1,5% (1996), 2,7% (1997). La tasa de desempleo bajó desde su máximo de 9,9% en 1993 a niveles cercanos al 6% hacia fin de 1998 —aún elevada en términos históricos—. El spread soberano sueco se mantuvo bajo control y los rendimientos largos convergieron hacia los alemanes.", "La interpretación parsimoniosa combina credibilidad nominal acumulada, consenso político transversal y un sistema bancario ya saneado por intervención pública previa: esa combinación permitió ejecutar el ajuste fiscal sin recesión adicional ni desanclaje de expectativas. El caso no debe leerse como demostración de 'austeridad expansiva': el contexto incluyó una depreciación cambiaria previa que actuó como amortiguador externo y un ciclo global expansivo; el desempleo se mantuvo alto durante todo el período y la composición del ajuste sigue siendo objeto de debate académico. Otros países con consolidaciones contemporáneas en marcos menos creíbles tuvieron resultados sustancialmente peores."], "caveat": "Ilustra una configuración institucional e histórica específica; no caracteriza permanentemente al país. No demuestra que toda consolidación pueda ejecutarse sin recesión: el contexto sueco incluyó un sistema bancario ya saneado, un tipo de cambio que actuó como amortiguador externo en 1992-1993 y un ciclo global expansivo. La generalización requiere atender al estado del sistema financiero, al régimen cambiario y al ciclo externo.", "fuentes": [{"texto": "Englund (1999). The Swedish Banking Crisis. Oxford REP 15(3).", "url": "https://doi.org/10.1093/oxrep/15.3.80"}, {"texto": "Calmfors & Wren-Lewis (2011). What should fiscal councils do? Economic Policy 26(68).", "url": "https://doi.org/10.1111/j.1468-0327.2011.00273.x"}, { texto: "Henriksson (2007). Ten Lessons about Budget Consolidation. Bruegel.", url: "https://www.bruegel.org/opinion-piece/10-lessons-about-budget-consolidation" }, {"texto": "Sveriges Riksbank. Inflation target history (1993, formal from 1995).", "url": "https://www.riksbank.se/en-gb/monetary-policy/the-inflation-target/"}, { texto: "FMI (1998). Sweden: Selected Issues. IMF Staff Country Report 98/124.", url: "https://www.imf.org/external/pubs/ft/scr/1998/cr98124.pdf" }, {"texto": "OECD (1999). OECD Economic Surveys: Sweden 1999.", "url": "https://www.oecd.org/en/publications/oecd-economic-surveys-sweden_19990448.html"}]},
    {"id": "grecia_2010_2015", "titulo": "Grecia, 2010-2015", "sub": "Consolidación severa bajo anclaje frágil en unión monetaria", "pais": "Grecia", "periodo": "2010-2015", "preguntaGuia": "¿Cuándo una consolidación fiscal se vuelve contractiva y auto-reforzante?", "tags": {"shock_types": ["sovereign_default", "banking_crisis"], "exchange_regime": "monetary_union", "central_bank": "no_target", "fiscal_rule": "imposed_external", "fiscal_buffer": "negative", "credibility_outcome": "temporary_unanchoring"}, "mecanismo_breve": "Programa Troika 2010 (110 mil millones €); déficit 2009 ≈15,4% PIB; PSI marzo 2012 con haircut nominal 53,5%; PIB cae 25% acumulado (2008-2013); desempleo peak 27,5%; spread peak 3.000 pb; multiplicador subestimado al inicio del programa.", "valor_historico": "Caso de consolidación auto-reforzante en ausencia de tipo de cambio propio y prestamista fiscal común; ancla del debate sobre diseño incompleto de la unión monetaria.", "cronica": ["En mayo de 2010, Grecia firmó el primer programa de rescate con la Troika (Comisión Europea, BCE, FMI) por 110 mil millones de euros, tras la revelación de que el déficit fiscal real era cerca del 15,4% del PIB en 2009, muy por encima de las cifras reportadas inicialmente. La consolidación exigida fue severa: caída del gasto primario, aumento de impuestos indirectos y reformas estructurales. En marzo de 2012 se ejecutó el PSI (Private Sector Involvement), con una reducción nominal cercana al 53,5% sobre el valor facial de los bonos elegibles; las pérdidas en valor presente neto para los acreedores privados fueron sustancialmente mayores, en torno al 70-75% según la metodología utilizada.", "Entre 2008 y 2013 el PIB griego cayó cerca de 25% en términos acumulados; el desempleo alcanzó un máximo de 27,5% en 2013, con desempleo juvenil por encima del 50%. El spread del bono soberano a 10 años pasó de menos de 100 puntos base en 2008 a un máximo cercano a 3.000 puntos base en marzo de 2012. El multiplicador fiscal real resultó significativamente mayor que el estimado por la Troika al inicio del programa, hecho reconocido en la ex-post evaluation del FMI de 2013 y formalizado en el paper de Blanchard y Leigh.", "La interpretación parsimoniosa es que un anclaje fiscal previamente erosionado, sin tipo de cambio propio para amortiguar el ajuste y con un sistema bancario en estrés, transformó la consolidación en una contracción profunda y auto-reforzante. Los mercados leyeron el ajuste no como señal de disciplina, sino como confirmación de un riesgo de salida del euro, lo que elevó la prima de riesgo y agravó la dinámica de la deuda. El tercer rescate de 2015, posterior al referéndum de Tsipras, mantuvo el régimen sin alterar la lógica de fondo. La trayectoria abre el debate sobre el diseño incompleto de la unión monetaria, la ausencia de prestamista fiscal común y la subestimación del multiplicador en programas concurrentes."], "caveat": "Ilustra una configuración institucional e histórica específica; no caracteriza permanentemente al país. Las decisiones acumuladas en las dos décadas previas, tanto domésticas como del diseño de la unión monetaria, son co-responsables del colapso. La generalización a otras consolidaciones requiere atender específicamente al régimen cambiario y al estado del sistema financiero.", "fuentes": [{"texto": "Blanchard & Leigh (2013). Growth Forecast Errors and Fiscal Multipliers. AER 103(3).", "url": "https://doi.org/10.1257/aer.103.3.117"}, {"texto": "Reinhart & Trebesch (2016). Sovereign Debt Relief and its Aftermath. JEEA 14(1).", "url": "https://doi.org/10.1111/jeea.12166"}, {"texto": "Zettelmeyer, Trebesch & Gulati (2013). The Greek Debt Restructuring: An Autopsy. Economic Policy 28(75).", "url": "https://doi.org/10.1111/1468-0327.12014"}, {"texto": "Bolton, Fu, Gulati & Panizza (2024). The 2012 Greek Retrofit and Borrowing Costs in the European Periphery.", "url": "https://doi.org/10.1177/2755323X231220978"}, {"texto": "FMI (2013). Greece: Ex Post   "argentina_convertibility": {"institution":"Ley de Convertibilidad (1991–2002): régimen de paridad fija 1 ARS/USD sin discretion en Banco Central; dependencia de capital externo; estructura de deuda pública dolarizada.","mechanism":"Shock externo (crisis rusa 1998, devaluación Brasil 1999) → caída de salida de capital → presión sobre reservas internacionales → bajo Convertibilidad, BC no puede expandir monetariamente sin dólares → base monetaria se contrae mecánicamente → demanda agregada cae → desempleo sube. Sin devaluación posible, ajuste real traumático y expectativas de ruptura aumentan.","affectedVariables":["reservas internacionales","base monetaria","tipo de cambio nominal (fijo por ley)","demanda agregada","expectativas de devaluación"],"feedbackLoop":"Expectativas de ruptura del régimen → corridas de depósitos → aún más caída de reservas → espiral contraccionista de base monetaria → depresión de actividad → mayor presión fiscal → inconsistencia se hace evidente → colapso final en diciembre 2001.","policyFeasibility":"Ley de Convertibilidad rigidiza política monetaria; BC sin discreción contracíclica; expansión fiscal provincial erosiona consistencia macro; dependencia crítica de capital externo.","incidence":"Exportables (agricultura, manufactura) golpeados primero; desempleo urbano formal; crisis de financiamiento de pymes.","discriminatingEvidence":"Reservas internacionales caen de US$ 26 mil millones (1992, pico) a US$ 10 mil millones (2001); desempleo abierto sube de 7% (1995) a 18% (2002); deuda externa representa 52% del PIB en 2001; default de deuda soberana declarado diciembre 2001 bajo Ley 25.561; devaluación de 200%+ en enero-febrero 2002 vs USD. Fuentes: BCRA, INDEC, Mussa (2002).","antiOverclaim":"MacroLab NO captura: (i) dinámicas de corridas y contagio financiero que rompen regímenes rígidamente creíbles (Calvo 1998); (ii) costos políticos de desempleo masivo que pueden presionar por salida del régimen (Alesina & Drazen 1991); (iii) interacción entre rigidez cambiaria e inconsistencia fiscal como juego temporal. La ficha ilustra por qué la rigidez sin coherencia fiscal acumula tensión; no predice el timing exacto de colapso."},
  "chile_2008_2009": {"institution":"BC de Chile con IT (meta 3%, ±1pp), independencia 1989; régimen flotante; gobierno con regla de balance estructural y FEES acumulado (US$20.211 millones ≈15% PIB).","mechanism":"Shock externo (crisis financiera global → caída de precios de cobre) → ingresos por divisas bajan → presión inicial en TC pero flotante lo absorbe → BC reduce TPM (775 pb entre ene-jun 2009) con credibilidad en IT → Gobierno usa buffer FEES para gasto anticíclico (2,8% PIB) sin quebrantar regla fiscal → credibilidad en BC y regla fiscal mantiene expectativas ancladas → demanda se amortigua sin desanclaje ni espiral.","affectedVariables":["tasa de política monetaria (TPM)","expectativas de inflación 12-24 meses","tipo de cambio nominal","gasto fiscal/demanda agregada","actividad económica y empleo"],"feedbackLoop":"Buffer anticíclico → demanda cae menos → empleo se sostiene → credibilidad en regla fiscal se refuerza (deuda no explota) → expectativas de inflación no se desanclan → BC mantiene tasa baja → recuperación 2009 sin inflación.","policyFeasibility":"BC autónomo con IT consolidada; regla fiscal creíble (balance estructural) permite reacción contracíclica; TC flexible absorbe volatilidad; FEES acumulado en bonanza reduce restricción de caja.","incidence":"Cuprífero y exportables (primer impacto); desempleados y trabajadores informales amortiguados por transferencias y subsidios del Plan Fiscal.","discriminatingEvidence":"TPM baja de 3,25% a 0,5% entre enero y junio 2009; inflación anual alcanza 1,4% en 2009 (bajo rango meta 2-4%); desempleo sube de 7% a 10,1% pero sin espiral; expectativas de inflación a 12-24m se mantienen en rango 2,5-3,5%, sin desanclaje. PIB cae 1,6% en 2009 pero rebota a 5,1% en 2010. FMI califica respuesta como ‘vigorosa, coordinada’. Fuentes: INE, DIPRES, BCCh.","antiOverclaim":"MacroLab NO captura: (i) dinámicas de reputación y construcción de credibilidad que permitieron el uso del buffer (De Gregorio & Valev 2003); (ii) cic ca del cepo y la reestructuración de deuda; (iii) el rol de la restricción externa en el pass-through. La ficha ilustra cómo dominancia fiscal transforma un shock común en inflación persistente; no modela la dinámica de largo plazo ni los múltiples regímenes cambiarios argentinos."},
  "suecia_1994_1998": {"institution":"Riksbank con IT (meta 2%, formal desde 1995); corona flotante (salida MTC nov 1992); sistema bancario saneado; gobierno con amplio consenso político para consolidación fiscal.","mechanism":"Tras crisis bancaria 1991–1993 y salida del MTC (nov 1992), corona depreció mejorando competitividad exportadora. Gobierno electo en 1994 inicia consolidación: déficit ~12% PIB → superávit (1998). PORQUE hubo depreciación previa, ajuste fiscal NO requirió deflación nominal adicional. Riksbank mantuvo expectativas ancladas (meta 2%) durante todo el proceso. Resultado: PIB creció 4,0% (1994), 3,9% (1995), 1,5% (1996), 2,7% (1997); desempleo bajó desde 9,9% (1993) a ~6% (1998).","affectedVariables":["tipo de cambio real (corona sueca)","balance fiscal","expectativas de inflación","PIB real","desempleo"],"feedbackLoop":"Depreciación 1992 → competitividad exportadora mejora → demanda externa sostiene PIB → credibilidad Riksbank mantiene expectativas ancladas → ajuste fiscal sin espiral contractiva. Sistema bancario saneado elimina riesgo de credit crunch.","policyFeasibility":"Riksbank bajo IT sin presión de monetización; gobierno con consenso transversal; corona flotante permite ajuste real sin deflación; sistema bancario previamente saneado elimina riesgo de crisis.","incidence":"Trabajadores públicos y beneficiarios de prestaciones (recortes directos); desempleados; sector exportador beneficiado por depreciación 1992.","discriminatingEvidence":"Déficit fiscal: ~12% PIB (1994) → superávit (1998); deuda pública/PIB: ~78% (1994) → ~65% (1998); PIB: +4,0% (1994), +3,9% (1995), +1,5% (1996), +2,7% (1997); desempleo: 9,9% (1993) → ~6% (1998); corona sale MTC nov 1992; Riksbank IT formal 1995. Fuentes: OECD 1999, FMI 1998, Riksbank, Englund 1999.","antiOverclaim":"MacroLab NO captura: (i) devaluación 1992 fue amortiguador CRÍTICO —sin ella, consolidación requeriría deflación severa (cf. Grecia, sin flotación); (ii) ciclo global expansivo 1994–1998 fue   "grecia_2010_2015": {"institution":"Grecia en eurozona sin política monetaria propia; BCE como prestamista de última instancia limitado; Troika (CE, BCE, FMI) como prestamista condicional a ajuste fiscal.","mechanism":"Revelación de déficit fiscal real (15,4% PIB, 2009) → pérdida de acceso a mercados → consolidación severa con multiplicador fiscal subestimado → PIB cae más de lo proyectado → ratio deuda/PIB sube → spread soberano se dispara (~3.000 pb, mar 2012) → bancos griegos en estrés, crédito bancario interno se contrae → actividad cae más; expectativas de permanencia en el euro se deterioran, elevan prima de riesgo; sin tipo de cambio, ajuste se desplaza a deflación de salarios nominales y empleo.","affectedVariables":["spread soberano","multiplicador fiscal","crédito bancario interno","salarios nominales y empleo","expectativas de permanencia en el euro"],"feedbackLoop":"Consolidación contrae PIB → ratio deuda/PIB sube → desconfianza aumenta → spread soberano sube → bancos en estrés → crédito bancario cae → PIB cae más → nueva austeridad exigida; ausencia de tipo de cambio hace el ajuste exclusivamente deflacionario.","policyFeasibility":"Sin moneda propia, devaluación imposible; financiamiento 100% condicional a ajuste fiscal; gobierno sin acceso a mercados desde 2010; resistencia social creciente limita el ritmo de ajuste.","incidence":"Trabajadores públicos y pensionistas golpeados primero (cortes directos); desempleo juvenil >50%; sector exportable pequeño sin buffer cambiario.","discriminatingEvidence":"PIB cae ~25% acumulado 2008–2013; desempleo: 27,5% (2013), juvenil >50%; spread 10A: ~3.000 pb (mar 2012); déficit revelado: 15,4% PIB (2009); PSI: reducción nominal 53,5%, pérdida VPN 70–75%; multiplicador estimado 0,5, real ~1,5 (Blanchard & Leigh 2013). Fuentes: Eurostat, FMI CR 13/156.","antiOverclaim":"MacroLab NO captura: (i) el rol del BCE/OMT (2012) en el restablecimiento parcial de la calma del mercado (De Grauwe 2012); (ii) el debate sobre diseño incompleto de la unión monetaria y ausencia de prestamista fiscal común; (iii) el doom loop entre bancos y soberano como amplificador autónomo. La ficha ilustra la espiral contraccionista bajo rigidez cambiaria; no modela contagio transfronterizo ni mecanismos supranacionales de estabilización."}

function cronicaUrl(id){
  const ruta = MACROLAB.rutas_registradas.find(r => r.cronicaKey === id);
  if (!ruta) return 'index.html?tab=lentes';
  return PATRON_URL
    .replace('{lente}',  encodeURIComponent(ruta.lente))
    .replace('{config}', encodeURIComponent(ruta.config));
}

// ====== Filtros ======
const DIM_ORDER = ['shock_types','exchange_regime','central_bank','fiscal_rule','fiscal_buffer','credibility_outcome'];
const DIM_TITLES = {
  shock_types:'Tipo de shock',
  exchange_regime:'Régimen cambiario',
  central_bank:'Banco central',
  fiscal_rule:'Regla fiscal',
  fiscal_buffer:'Buffer fiscal',
  credibility_outcome:'Resultado credibilidad'
};
const state = {
  active: Object.fromEntries(DIM_ORDER.map(d => [d, new Set()])),
  view: 'grid'
};

function buildFilters(){
  const root = document.getElementById('filters');
  root.innerHTML = DIM_ORDER.map(dim => {
    const labels = DATA.tag_labels[dim];
    const checks = Object.entries(labels).map(([k,v]) =>
      `<label><input type="checkbox" data-dim="${dim}" value="${k}"> ${v}</label>`
    ).join('');
    return `<div class="group"><h2>${DIM_TITLES[dim]}</h2>${checks}</div>`;
  }).join('');
  root.addEventListener('change', e=>{
    const cb = e.target;
    if (!cb || !cb.dataset.dim) return;
    const set = state.active[cb.dataset.dim];
    if (cb.checked) set.add(cb.value); else set.delete(cb.value);
    rerender();
  });
  document.getElementById('reset').addEventListener('click',()=>{
    DIM_ORDER.forEach(d=>state.active[d].clear());
    document.querySelectorAll('aside.filters input[type=checkbox]').forEach(c=>c.checked=false);
    rerender();
  });
}

function passes(c){
  for (const dim of DIM_ORDER){
    const sel = state.active[dim];
    if (sel.size === 0) continue;
    const v = c.tags[dim];
    if (Array.isArray(v)){
      if (![...sel].some(x => v.includes(x))) return false;
    } else {
      if (!sel.has(v)) return false;
    }
  }
  return true;
}

function chip(dim, val){
  const cls = ({shock_types:'shock',exchange_regime:'regime',central_bank:'cb',fiscal_rule:'rule',fiscal_buffer:'buffer',credibility_outcome:'outcome'})[dim];
  return `<span class="chip ${cls}">${DATA.tag_labels[dim][val] || val}</span>`;
}

function chipsFor(c){
  const out = [];
  (c.tags.shock_types||[]).forEach(s=>out.push(chip('shock_types',s)));
  out.push(chip('exchange_regime',c.tags.exchange_regime));
  out.push(chip('central_bank',c.tags.central_bank));
  out.push(chip('fiscal_rule',c.tags.fiscal_rule));
  out.push(chip('fiscal_buffer',c.tags.fiscal_buffer));
  out.push(chip('credibility_outcome',c.tags.credibility_outcome));
  return out.join(' ');
}

// ====== Render ======
function renderGrid(filtered){
  const root = document.getElementById('view-grid');
  root.innerHTML = `<div class="grid">${
    filtered.map(c=>`
      <article class="card" data-id="${c.id}">
        <header>
          <h3>${c.titulo}</h3>
          <div class="sub">${c.sub}</div>
        </header>
        <div class="chips">${chipsFor(c)}</div>
        <p class="pregunta">${c.preguntaGuia}</p>
        <p class="mech"><strong>Mecanismo:</strong> ${c.mecanismo_breve}</p>
        <p class="valor"><strong>Valor histórico:</strong> ${c.valor_historico}</p>
        <div class="actions">
          <a href="${cronicaUrl(c.id)}" target="_blank" rel="noopener">Abrir en MacroLab →</a>
          <a href="#" data-detail="${c.id}">Ver detalle</a>
        </div>
      </article>
    `).join('')
  }</div>`;
}

const REGIMES_ORDER = ['floating','managed_float','hard_peg','monetary_union','mixed'];
const CB_ORDER = ['independent_inflation_target','recently_adopted_target','political_pressure','no_target','fx_anchor_substitute'];
function renderMatrix(filtered){
  const root = document.getElementById('view-matrix');
  // Filas = régimen cambiario; Columnas = banco central. Cada celda apila las crónicas.
  const rows = REGIMES_ORDER.map(r => {
    const cols = CB_ORDER.map(b => {
      const cell = filtered.filter(c=>c.tags.exchange_regime===r && c.tags.central_bank===b);
      if (cell.length===0) return `<td class="empty">—</td>`;
      return `<td class="outcome-${cell[0].tags.credibility_outcome}">${
        cell.map(c=>`<a class="mcase" href="#" data-detail="${c.id}">${c.titulo}</a>`).join('')
      }</td>`;
    }).join('');
    return `<tr><th>${DATA.tag_labels.exchange_regime[r]}</th>${cols}</tr>`;
  }).join('');
  const headerCols = CB_ORDER.map(b=>`<th>${DATA.tag_labels.central_bank[b]}</th>`).join('');
  root.innerHTML = `
    <div class="matrix-wrap">
      <p style="color:var(--muted);font-size:12.5px;margin:0 0 12px">
        Matriz <strong>régimen cambiario × banco central</strong>. Borde de celda
        codifica el resultado de credibilidad
        (<span style="color:var(--ok)">verde = anclaje</span>,
         <span style="color:var(--warn)">amarillo = transitorio</span>,
         <span style="color:var(--bad)">rojo = persistente</span>).
      </p>
      <table class="matrix">
        <thead><tr><th></th>${headerCols}</tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

function renderMacroLab(filtered){
  const root = document.getElementById('view-macrolab');
  // Filas = lentes (8); columnas = configs (4). Cada celda muestra la
  // ruta editorial registrada (si existe) o gap prioritario o vacío.
  const filteredIds = new Set(filtered.map(c => c.id));
  const lentes = Object.keys(MACROLAB.lentes);
  const configs = Object.keys(MACROLAB.configs);

  function cellFor(lente, config){
    const r = MACROLAB.rutas_registradas.find(x => x.lente===lente && x.config===config);
    if (r){
      const cron = DATA.cronicas.find(c => c.id === r.cronicaKey);
      const visible = !filtered.length || filteredIds.has(r.cronicaKey);
      const opacity = visible ? 1 : 0.35;
      const titulo = cron ? cron.titulo : r.cronicaKey;
      return `<td class="has-route" style="opacity:${opacity}">
        <span class="badge">Ruta ✓</span>
        <a href="#" data-detail="${r.cronicaKey}">${titulo}</a>
      </td>`;
    }
    const g = MACROLAB.gaps_prioritarios.find(x => x.lente===lente && x.config===config);
    if (g){
      const cron = DATA.cronicas.find(c => c.id === g.cronicaKey);
      const visible = !filtered.length || filteredIds.has(g.cronicaKey);
      const opacity = visible ? 1 : 0.35;
      const titulo = cron ? cron.titulo : g.cronicaKey;
      const estado = g.estado === 'borrador_listo' ? 'Borrador listo' : 'Gap prioritario';
      const anchorMark = g.anchor ? ' · anchor' : '';
      const nota = g.estado === 'borrador_listo'
        ? 'Ruta redactada en 04_rutas_editoriales/, lista para mergear'
        : 'Sin ruta editorial registrada';
      return `<td class="has-pending" style="opacity:${opacity}">
        <span class="badge">${estado}${anchorMark}</span>
        <div style="margin-bottom:2px">${titulo}</div>
        <div style="font-size:10.5px;color:var(--muted)">${nota}</div>
      </td>`;
    }
    return `<td class="empty">—</td>`;
  }

  const headerCols = configs.map(c => `<th class="col" title="${MACROLAB.configs[c]}">${c}<br><span style="font-weight:400;font-size:10px;color:var(--muted)">${MACROLAB.configs[c]}</span></th>`).join('');
  const rows = lentes.map(l => {
    const cells = configs.map(c => cellFor(l, c)).join('');
    const lente = MACROLAB.lentes[l];
    return `<tr><th>${lente.label}<br><span style="font-weight:400;font-size:10px;color:var(--muted)">${l} · ${lente.tab.toUpperCase()}</span></th>${cells}</tr>`;
  }).join('');

  const totalCells = lentes.length * configs.length;
  const cubiertas = MACROLAB.rutas_registradas.length;
  const gaps = MACROLAB.gaps_prioritarios.length;
  const borradores = MACROLAB.gaps_prioritarios.filter(g => g.estado === 'borrador_listo').length;
  const tras_merge = cubiertas + borradores;

  root.innerHTML = `
    <div class="matrix-wrap">
      <p style="color:var(--muted);font-size:12.5px;margin:0 0 8px">
        Matriz operativa real del simulador: <strong>4 configuraciones × 8 lentes = ${totalCells} combinaciones</strong>.
        Rutas registradas en <code>MacroLabRouteRegistryES</code>: <strong>${cubiertas}</strong> (${Math.round(cubiertas/totalCells*100)}%).
        Borradores listos para mergear: <strong>${borradores}</strong>. Tras el merge la cobertura pasa a <strong>${tras_merge}/${totalCells}</strong> (${Math.round(tras_merge/totalCells*100)}%).
      </p>
      <div class="legend">
        <span class="key"><i class="ok"></i>Ruta editorial registrada</span>
        <span class="key"><i class="pend"></i>Borrador listo (en <code>04_rutas_editoriales/</code>)</span>
        <span class="key"><i class="empty"></i>Combinación sin caso histórico fuerte (fallback genérico)</span>
      </div>
      <p style="color:var(--muted);font-size:11.5px;margin:0 0 12px">
        Los filtros laterales se aplican: si filtras por una crónica, las demás se atenúan en la matriz.
      </p>
      <table class="macrolab">
        <thead><tr><th></th>${headerCols}</tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <p style="color:var(--muted);font-size:11.5px;margin-top:14px">
        Detalle del mapeo crónica → ruta y de las tensiones de catalogación: ver <code>00_indice/MAPEO_MACROLAB.md</code>.
      </p>
    </div>
  `;
}

function renderCoverage(filtered){
  const root = document.getElementById('view-coverage');
  // Cobertura por dimensión.
  const cells = DIM_ORDER.map(dim => {
    const labels = DATA.tag_labels[dim];
    const total = Object.keys(labels).length;
    const seen = new Set();
    filtered.forEach(c => {
      const v = c.tags[dim];
      if (Array.isArray(v)) v.forEach(x=>seen.add(x)); else seen.add(v);
    });
    const pct = Math.round(seen.size/total*100);
    const missing = Object.keys(labels).filter(k=>!seen.has(k)).map(k=>labels[k]);
    return `
      <div class="cov-cell">
        <div class="lbl">${DIM_TITLES[dim]}</div>
        <div class="val">${seen.size} / ${total} categorías cubiertas (${pct}%)</div>
        <div class="bar"><span style="width:${pct}%"></span></div>
        ${missing.length ? `<div style="margin-top:8px;font-size:11.5px;color:var(--muted)"><strong>Huecos:</strong> ${missing.join(', ')}</div>` : ''}
      </div>
    `;
  }).join('');
  root.innerHTML = `
    <div class="coverage">
      <h2>Cobertura del banco de crónicas (${filtered.length} casos)</h2>
      <div class="cov-grid">${cells}</div>
      <p style="color:var(--muted);font-size:12px;margin-top:14px">
        Los huecos son <strong>oportunidades pedagógicas</strong>: configuraciones
        institucionales o tipos de shock para los que conviene incorporar una
        crónica adicional. La ausencia, en sí misma, es información útil para
        Macro II.
      </p>
    </div>
  `;
}

function showDetail(id){
  const c = DATA.cronicas.find(x=>x.id===id);
  if (!c) return;
  const pane = document.getElementById('detail-pane');
  const cronicaHtml = (c.cronica||[]).map(p=>`<p style="margin:0 0 10px">${p}</p>`).join('');
  const fuentesHtml = (c.fuentes||[]).length
    ? `<ul style="margin:6px 0 0;padding-left:18px;font-size:12.5px">${
        (c.fuentes||[]).map(f=>`<li style="margin-bottom:5px"><a href="${f.url}" target="_blank" rel="noopener">${f.texto}</a></li>`).join('')
      }</ul>`
    : '';

  // institutionalLayer — disponible para las 5 crónicas piloto
  const il = INSTITUTIONAL_LAYERS[c.id];
  function ilPanel(label, text, warn){
    const style = warn
      ? 'border-left-color:#d97706;background:#fffbeb'
      : '';
    const labelStyle = warn ? 'color:#92400e' : '';
    return `<div class="il-atlas-panel" style="${style}">
      <div class="il-atlas-label" style="${labelStyle}">${label}</div>
      <p class="il-atlas-text">${text}</p>
    </div>`;
  }
  const ilHtml = il ? `<div class="sec">
    <h4>LENTES INSTITUCIONALES</h4>
    <div class="il-grid-atlas">
      ${ilPanel('2.1 · Institución Focal', il.institution)}
      ${ilPanel('2.2 · Mecanismo', il.mechanism)}
      ${ilPanel('2.3 · Feedback Loop', il.feedbackLoop)}
      ${ilPanel('2.4 · Viabilidad de Política', il.policyFeasibility)}
    </div>
    <details style="margin-top:8px;border:1px dashed #d8e1ea;border-radius:6px;padding:8px 12px">
      <summary style="cursor:pointer;font-size:12px;font-weight:700;color:var(--muted)">ALCANCE Y LÍMITES</summary>
      <div class="il-grid-atlas" style="margin-top:10px">
        ${ilPanel('3.1 · Incidencia Distributiva', il.incidence)}
        ${ilPanel('3.2 · Evidencia Discriminante', il.discriminatingEvidence)}
        ${ilPanel('3.3 · Advertencia Pedagógica', il.antiOverclaim, true)}
      </div>
      ${il.affectedVariables && il.affectedVariables.length ? `<p style="margin:10px 0 0;font-size:11.5px;color:var(--muted)"><strong>Variables afectadas:</strong> ${il.affectedVariables.join(' · ')}</p>` : ''}
    </details>
  </div>` : '';

  pane.innerHTML = `
    <button class="close" id="close-detail" aria-label="Cerrar">×</button>
    <h3>${c.titulo}</h3>
    <div class="sub" style="color:var(--muted);font-size:13px">${c.sub}</div>
    <div class="chips" style="margin-top:10px">${chipsFor(c)}</div>
    <div class="sec">
      <h4>Pregunta-guía</h4>
      <p style="font-style:italic">${c.preguntaGuia}</p>
    </div>
    ${cronicaHtml ? `<div class="sec"><h4>Crónica del episodio</h4>${cronicaHtml}</div>` : ''}
    <div class="sec knowledge">
      <h4>Análisis institucional</h4>
      <p class="a"><strong>(a) Mecanismo académico:</strong> ${c.mecanismo_breve}</p>
      <p class="b"><strong>(b) Inferencia pedagógica:</strong> el etiquetado shock × configuración es herramienta de comparación, no clasificación canónica. Cada crónica ilustra un mecanismo, no una sentencia sobre el país.</p>
      <p class="c"><strong>(c) En MacroLab:</strong> abre "Lentes institucionales" con este shock y configuración para ver la trayectoria formal del ajuste.</p>
    </div>
    ${ilHtml}
    <div class="sec">
      <h4>Valor histórico y comparado</h4>
      <p>${c.valor_historico}</p>
    </div>
    ${c.caveat ? `<div class="sec"><h4>Advertencia pedagógica</h4><p style="padding:9px 12px;border-radius:7px;background:#fffbeb;border-left:3px solid var(--warn);font-size:13px;margin:0">${c.caveat}</p></div>` : ''}
    ${fuentesHtml ? `<div class="sec"><h4>Fuentes verificadas</h4>${fuentesHtml}</div>` : ''}
    <div class="sec">
      <h4>Acceso</h4>
      <p><a href="${cronicaUrl(c.id)}" target="_blank" rel="noopener">Abrir en MacroLab →</a></p>
    </div>
  `;
  document.getElementById('detail').classList.add('is-open');
  document.getElementById('close-detail').addEventListener('click', closeDetail);
}
function closeDetail(){ document.getElementById('detail').classList.remove('is-open'); }
document.getElementById('detail').addEventListener('click', e=>{
  if (e.target.id==='detail') closeDetail();
});
document.addEventListener('click', e=>{
  const t = e.target.closest('[data-detail]');
  if (t){ e.preventDefault(); showDetail(t.dataset.detail); }
});

// Toggle vistas
document.querySelectorAll('.views button').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.views button').forEach(x=>x.classList.remove('is-active'));
    b.classList.add('is-active');
    state.view = b.dataset.view;
    document.querySelectorAll('.view').forEach(v=>v.hidden = v.id !== 'view-'+state.view);
  });
});

function rerender(){
  const filtered = DATA.cronicas.filter(passes);
  document.getElementById('count').textContent = filtered.length;
  document.getElementById('total').textContent = DATA.cronicas.length;
  renderGrid(filtered);
  renderMatrix(filtered);
  renderMacroLab(filtered);
  renderCoverage(filtered);
}

buildFilters();
rerender();
</script>
